<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkSpace - Read & Write</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Quill Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <!-- jsPDF for Offline Reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- DOMPurify for sanitizing editor content to prevent XSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>

    <link rel="stylesheet" href="/styles.css">
</head>
<body class="antialiased min-h-screen flex flex-col">

<!-- Navigation -->
<nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center cursor-pointer" onclick="router.navigate('home')">
                <i class="fa-solid fa-feather-pointed text-indigo-600 text-2xl mr-2"></i>
                <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">InkSpace</span>
            </div>

            <div id="nav-search-container" class="hidden md:flex items-center flex-1 max-w-lg mx-8">
                <div class="relative w-full">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                        </span>
                    <input type="text" id="global-search"
                           class="block w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-600 rounded-full leading-5 bg-slate-50 dark:bg-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-indigo-500 sm:text-sm transition"
                           placeholder="Search stories, authors, tags...">
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <button onclick="toggleGlobalDarkMode()" class="p-2 text-slate-500 hover:text-indigo-600 transition" title="Toggle Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button id="install-btn" onclick="installPWA()" class="hidden md:block px-3 py-1 text-xs font-medium text-indigo-600 bg-indigo-50 rounded-full hover:bg-indigo-100 transition">
                    Install App
                </button>

                <button onclick="router.navigate('reader-login')" class="hidden md:block px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:text-indigo-600 dark:hover:text-indigo-400 transition" id="reader-login-btn">
                    <i class="fa-solid fa-book-reader mr-1"></i>
                    Reader Login
                </button>

                <div id="reader-menu" class="hidden relative ml-3">
                    <button id="reader-menu-button" onclick="toggleReaderDropdown()" class="flex items-center space-x-2 cursor-pointer hover:opacity-80 transition">
                        <div class="h-8 w-8 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 font-bold text-sm">
                            <span id="reader-initial">R</span>
                        </div>
                        <span id="reader-name" class="text-sm font-medium text-slate-700 dark:text-slate-200">Reader</span>
                        <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                    </button>

                    <div id="reader-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-md shadow-lg border border-slate-200 dark:border-slate-700 z-50">
                        <div class="py-1">
                            <button onclick="router.navigate('reader-dashboard')" class="w-full text-left px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center">
                                <i class="fa-solid fa-gauge mr-3 w-4"></i>
                                Dashboard
                            </button>
                            <button onclick="readerLogout()" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center">
                                <i class="fa-solid fa-right-from-bracket mr-3 w-4"></i>
                                Logout
                            </button>
                        </div>
                    </div>
                </div>

                <div id="user-menu" class="hidden relative ml-3">
                    <button id="user-menu-button" onclick="toggleUserDropdown()" class="flex items-center space-x-2 cursor-pointer hover:opacity-80 transition">
                        <div class="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm">
                            <span id="user-initial">A</span>
                        </div>
                        <span id="user-name" class="text-sm font-medium text-slate-700 dark:text-slate-200">Author</span>
                        <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                    </button>

                    <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-md shadow-lg border border-slate-200 dark:border-slate-700 z-50">
                        <div class="py-1">
                            <button onclick="router.navigate('author-dashboard')" class="w-full text-left px-4 py-2 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center">
                                <i class="fa-solid fa-gauge mr-3 w-4"></i>
                                Dashboard
                            </button>
                            <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center">
                                <i class="fa-solid fa-right-from-bracket mr-3 w-4"></i>
                                Logout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<main id="app" class="flex-grow">
    <!-- Views will be injected here -->
</main>

<!-- Footer -->
<footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 mt-auto transition-colors">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
        <p class="text-sm text-slate-600 dark:text-slate-400">
            InkSpace. A platform for writers and readers.
        </p>
        <a href="#/author" onclick="router.navigate('author-login')" class="text-xs text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 mt-2 md:mt-0 transition">
            Author Access
        </a>
    </div>
</footer>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <div class="bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center">
        <i id="toast-icon" class="fa-solid fa-check-circle mr-3 text-green-400"></i>
        <span id="toast-message">Notification</span>
    </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
